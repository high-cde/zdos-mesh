name: ZEN Autobuild

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Git
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

    - name: Make autobuild executable
      run: chmod +x autobuild.sh

    - name: Run autobuild
      run: ./autobuild.sh

    - name: Push changes
      run: |
        git add .
        git commit -m "GitHub Actions Autobuild" || echo "No changes"
        git push
